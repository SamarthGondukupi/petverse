<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Successful</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card p-5 shadow text-center success-card">
    <h1 class="text-success">✔ Payment Successful</h1>
    <p class="mt-3">Your order has been placed successfully.</p>

    <div id="orderSummary" class="mt-4"></div>

    <a href="products.html" class="btn btn-warning mt-4">Continue Shopping</a>
  </div>
</div>

<script>
const cart = JSON.parse(localStorage.getItem('cart')) || [];
let total = 0;

cart.forEach(item => {
  total += item.price;
});

document.getElementById('orderSummary').innerHTML = `
  <h4>Order Summary</h4>
  <p>Total Items: ${cart.length}</p>
  <p>Total Amount: ₹${total}</p>
`;

localStorage.removeItem('cart');
</script>
</body>
</html>
